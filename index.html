<!DOCTYPE html>
<html>
<head>
<title>Smart Meter Live Data</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body{
    font-family: Arial;
    text-align: center;
    background: #f2f2f2;
    margin-top: 80px;
}

h1{
    color: #333;
}

#box{
    font-size: 60px;
    padding: 30px;
    background: white;
    display: inline-block;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    margin-top: 20px;
}
</style>

</head>

<body>

<h1>⚡ Smart Meter Live Data</h1>

<div id="box">Waiting...</div>

<script>

// MQTT broker (PUBLIC)
const host = "wss://broker.hivemq.com:8884/mqtt";

// SAME topic as ESP8266
const topic = "smartmeter/room1/data";

// Connect client
const client = mqtt.connect(host);

// On connect
client.on("connect", function () {
    console.log("Connected to MQTT");
    client.subscribe(topic);
});

// On message receive
client.on("message", function (topic, message) {
    document.getElementById("box").innerHTML = message.toString();
});

</script>

</body>
</html>
